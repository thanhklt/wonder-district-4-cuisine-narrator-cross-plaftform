events { worker_connections 1024; }

http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Dùng biến để nginx resolve DNS động mỗi lần request (không cache IP cũ)
  map $host $api_upstream    { default "api:5000"; }
  map $host $mobile_upstream { default "mobile:3000"; }

  server {
    listen 80;

    location / {
      set $mobile http://$mobile_upstream;
      proxy_pass $mobile;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    location /api/ {
      set $api http://$api_upstream;
      proxy_pass $api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    location /hubs/ {
      set $api http://$api_upstream;
      proxy_pass $api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
    }

    location /audio/ {
      set $api http://$api_upstream;
      proxy_pass $api;
      proxy_read_timeout 30s;
    }

    location /qr/ {
      set $api http://$api_upstream;
      proxy_pass $api;
      proxy_read_timeout 10s;
    }
  }

  server {
    listen 443 ssl;
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
      set $mobile http://$mobile_upstream;
      proxy_pass $mobile;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 60s;
    }

    location /api/ {
      set $api http://$api_upstream;
      proxy_pass $api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 30s;
    }

    location /hubs/ {
      set $api http://$api_upstream;
      proxy_pass $api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
    }

    location /audio/ {
      set $api http://$api_upstream;
      proxy_pass $api;
      proxy_read_timeout 30s;
    }

    location /qr/ {
      set $api http://$api_upstream;
      proxy_pass $api;
      proxy_read_timeout 10s;
    }
  }
}
