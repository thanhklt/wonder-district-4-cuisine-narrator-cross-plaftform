services:
  # ─── DeepTranslate Service ─────────────────────────────
  deep-translate:
    build:
      context: ./DeepTranslateService
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${DEEP_TRANSLATE_PORT:-8000}:8000"
    environment:
      - PORT=8000
      - DEEPL_API_KEY=${DEEPL_API_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── TTS Service ───────────────────────────────────────
  tts:
    build:
      context: ./TTSService
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${TTS_PORT:-8001}:8001"
    volumes:
      - audio_storage:/storage/audio
    environment:
      - PORT=8001
      - AUDIO_STORAGE_PATH=/storage/audio
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── API Service (C#) ──────────────────────────────────
  api:
    build:
      context: ./ApiService
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-5000}:5000"
    volumes:
      - audio_storage:/storage/audio
      - ./storage/qr:/storage/qr
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS}
      - SESSION_EXPIRY_HOURS=${SESSION_EXPIRY_HOURS}
      - VNPAY_TMN_CODE=${VNPAY_TMN_CODE}
      - VNPAY_HASH_SECRET=${VNPAY_HASH_SECRET}
      - VNPAY_URL=${VNPAY_URL}
      - VNPAY_RETURN_URL=${VNPAY_RETURN_URL}
      - DEEP_TRANSLATE_URL=${DEEP_TRANSLATE_URL}
      - TTS_URL=${TTS_URL}
      - AUDIO_STORAGE_PATH=/storage/audio
      - QR_STORAGE_PATH=/storage/qr
      - MOBILE_APP_URL=${MOBILE_APP_URL}
    depends_on:
      deep-translate:
        condition: service_healthy
      tts:
        condition: service_healthy

  # ─── Mobile PWA ────────────────────────────────────────
  mobile:
    build:
      context: ./mobile-app
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${MOBILE_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_MAPS_TILE=${NEXT_PUBLIC_MAPS_TILE}
    depends_on:
      - api

  # ─── WebApp (Admin/Owner) ──────────────────────────────
  webapp:
    build:
      context: ./web-app
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${WEBAPP_PORT:-3001}:3001"
    environment:
      - NEXT_PUBLIC_WEBAPP_API_URL=${NEXT_PUBLIC_WEBAPP_API_URL}
    depends_on:
      - api

volumes:
  audio_storage:
