<!DOCTYPE html>
<html lang="vn" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tổng quan - Audio Travelling</title>

    <!-- Design System -->
    <link rel="stylesheet" href="../../assets/css/base.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/finance.css">
    <link rel="stylesheet" href="../../assets/css/theme-light.css">

    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div style="display:flex; height:100vh; overflow:hidden;">
        <aside class="sidebar" id="app-sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-brand-icon">
                    <i class="fa-solid fa-store"></i>
                </div>
                <div class="sidebar-brand-text">
                    Du Hý Đó <span>Đây</span>
                    <small>Phố Ẩm Thực Khánh Hội</small>
                </div>
            </div>

            <nav class="sidebar-nav" id="sidebar-nav">
                <a class="nav-link active" href="./DashboardOwner.html">
                    <i class="fa-solid fa-chart-pie"></i> Tổng quan
                </a>
                <a class="nav-link" href="./BoothOwner.html">
                    <i class="fa-solid fa-store"></i> Quản lý gian hàng
                </a>
                <a class="nav-link" href="./FinanceOwner.html">
                    <i class="fa-solid fa-coins"></i> Tài chính
                </a>
                <a class="nav-link" href="./PackageOwner.html">
                    <i class="fa-solid fa-tags"></i> Gói dịch vụ
                </a>
                <a class="nav-link" href="./OrdersOwner.html">
                    <i class="fa-solid fa-box-open"></i> Đơn hàng
                </a>
                <div class="nav-divider"></div>
                <a class="nav-link" href="./SettingsOwner.html">
                    <i class="fa-solid fa-gear"></i> Cài đặt
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <img id="sidebar-avatar" src="https://i.pravatar.cc/150?img=11" alt="Owner" class="sidebar-avatar">
                    <div class="sidebar-user-info">
                        <p id="sidebar-name" class="sidebar-user-name">Owner</p>
                        <a href="../../index.html" class="btn-signout" style="text-decoration:none;">
                            <i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng xuất
                        </a>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-area">
            <header class="top-header">
                <h2>Tổng quan</h2>
                <div></div>
            </header>

            <div class="content-wrapper">
                <div id="view-dashboard-owner" class="view-section active">
                    <div class="grid-4 mb-6">
                        <div class="glass-card stat-card">
                            <div class="stat-icon amber"><i class="fa-solid fa-coins"></i></div>
                            <div>
                                <p class="stat-label">Tổng doanh thu</p>
                                <p class="stat-value" id="stat-revenue-owner">0 ₫</p>
                            </div>
                        </div>
                        <div class="glass-card stat-card">
                            <div class="stat-icon green"><i class="fa-solid fa-circle-check"></i></div>
                            <div>
                                <p class="stat-label">Số lượng đơn hàng giao thành công</p>
                                <p class="stat-value" id="stat-success-owner">0</p>
                            </div>
                        </div>
                        <div class="glass-card stat-card">
                            <div class="stat-icon amber"><i class="fa-solid fa-hourglass-half"></i></div>
                            <div>
                                <p class="stat-label">Số lượng đơn hàng đang xử lý</p>
                                <p class="stat-value" id="stat-pending-owner">0</p>
                            </div>
                        </div>
                        <div class="glass-card stat-card">
                            <div class="stat-icon red"><i class="fa-solid fa-ban"></i></div>
                            <div>
                                <p class="stat-label">Số lượng đơn hàng bị hủy</p>
                                <p class="stat-value" id="stat-cancelled-owner">0</p>
                            </div>
                        </div>
                    </div>

                    <div style="display:grid; grid-template-columns: 2fr 1fr; gap:20px; margin-bottom:24px;">
                        <div class="glass-card" style="padding:24px;">
                            <h3 style="font-size:16px; font-weight:700; margin-bottom:8px;">
                                <i class="fa-solid fa-chart-line text-accent" style="margin-right:8px;"></i>Thống kê doanh thu
                            </h3>

                            <div class="section-controls" style="display:flex; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:wrap;">
                                <div class="timeframe-tabs" style="display:flex; gap:8px; align-items:center;">
                                    <label for="timeframe-select-owner" style="margin:0; font-size:13px; color:var(--text-muted); margin-right:6px;">Theo:</label>
                                    <select id="timeframe-select-owner" class="form-input" style="padding:8px 10px; width:140px;">
                                        <option value="day">Ngày</option>
                                        <option value="week">Tuần</option>
                                        <option value="month">Tháng</option>
                                        <option value="year">Năm</option>
                                    </select>
                                </div>

                                <div id="date-range-controls-owner" style="margin-left:auto; display:flex; align-items:center; gap:8px;">
                                    <label class="form-label" style="margin:0 6px 0 0; font-size:12px;">Từ</label>
                                    <input id="filter-from-owner" type="date" class="form-input" style="padding:8px 10px; width:150px;" />
                                    <label class="form-label" style="margin:0 6px 0 0; font-size:12px;">Đến</label>
                                    <input id="filter-to-owner" type="date" class="form-input" style="padding:8px 10px; width:150px;" />
                                    <button id="btn-filter-owner" type="button" class="btn-primary" style="margin-left:6px;">Tìm kiếm</button>
                                </div>
                            </div>

                            <div class="chart-wrapper">
                                <canvas id="revenueChart-owner"></canvas>
                            </div>
                        </div>

                        <div class="glass-card" style="padding:24px;">
                            <h3 style="font-size:16px; font-weight:700; margin-bottom:16px;">
                                <i class="fa-solid fa-bolt text-accent" style="margin-right:8px;"></i>Hoạt động gần đây
                            </h3>
                            <div id="activity-list-owner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const dummyOrders = [
                { id: 'ORD-2101', product: 'Combo Banh Mi Chao', qty: 12, price: 89000, status: 'success', date: '2026-03-18' },
                { id: 'ORD-2102', product: 'Set Lau Thai Mini', qty: 6, price: 159000, status: 'pending', date: '2026-03-18' },
                { id: 'ORD-2099', product: 'Bun Bo Dac Biet', qty: 9, price: 79000, status: 'success', date: '2026-03-17' },
                { id: 'ORD-2096', product: 'Tra Dao Cam Sa', qty: 20, price: 39000, status: 'cancelled', date: '2026-03-16' },
                { id: 'ORD-2092', product: 'Com Suon Nuong', qty: 15, price: 69000, status: 'success', date: '2026-03-15' },
                { id: 'ORD-2087', product: 'Ga Ran Sot Mat Ong', qty: 8, price: 119000, status: 'success', date: '2026-03-14' }
            ];

            const formatCurrency = function (value) {
                return new Intl.NumberFormat('vi-VN').format(value || 0) + ' ₫';
            };

            const successOrders = dummyOrders.filter(function (o) { return o.status === 'success'; });
            const pendingOrders = dummyOrders.filter(function (o) { return o.status === 'pending'; });
            const cancelledOrders = dummyOrders.filter(function (o) { return o.status === 'cancelled' || o.status === 'canceled'; });
            const totalRevenue = successOrders.reduce(function (sum, o) { return sum + (o.price * o.qty); }, 0);

            const statRevenue = document.getElementById('stat-revenue-owner');
            const statSuccess = document.getElementById('stat-success-owner');
            const statPending = document.getElementById('stat-pending-owner');
            const statCancelled = document.getElementById('stat-cancelled-owner');

            if (statRevenue) statRevenue.textContent = formatCurrency(totalRevenue);
            if (statSuccess) statSuccess.textContent = String(successOrders.length);
            if (statPending) statPending.textContent = String(pendingOrders.length);
            if (statCancelled) statCancelled.textContent = String(cancelledOrders.length);

            const activityList = document.getElementById('activity-list-owner');
            if (activityList) {
                const statusLabel = function (status) {
                    if (status === 'success') return 'Thành công';
                    if (status === 'pending') return 'Đang xử lý';
                    return 'Bị hủy';
                };

                const statusColor = function (status) {
                    if (status === 'success') return 'var(--emerald, #22c55e)';
                    if (status === 'pending') return '#fbbf24';
                    return '#ef4444';
                };

                activityList.innerHTML = dummyOrders.slice(0, 5).map(function (o) {
                    return '\n                        <div class="activity-item" style="display:flex; gap:12px; margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid var(--border);">\n                            <div style="width:10px; height:10px; border-radius:50%; margin-top:6px; background:' + statusColor(o.status) + ';"></div>\n                            <div>\n                                <p style="font-size:13px; font-weight:600; margin-bottom:2px;">Đơn hàng <strong>' + o.id + '</strong></p>\n                                <p style="font-size:12px; color:var(--text-dim); margin-bottom:4px;">' + o.product + ' (×' + o.qty + ')</p>\n                                <p style="font-size:11px; color:var(--text-muted);">' + statusLabel(o.status) + ' • ' + o.date + '</p>\n                            </div>\n                        </div>\n                    ';
                }).join('');
            }

            const chartCanvas = document.getElementById('revenueChart-owner');
            if (chartCanvas && typeof Chart !== 'undefined') {
                const labels = ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];
                const data = [1850000, 2640000, 2310000, 3180000, 2890000, 3520000, 4010000];
                const ctx = chartCanvas.getContext('2d');
                const gradient = ctx.createLinearGradient(0, 0, 0, 260);
                gradient.addColorStop(0, 'rgba(34, 197, 94, 0.2)');
                gradient.addColorStop(1, 'rgba(34, 197, 94, 0)');

                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Doanh thu (VNĐ)',
                            data: data,
                            borderColor: '#22c55e',
                            backgroundColor: gradient,
                            fill: true,
                            borderWidth: 2.5,
                            tension: 0.4,
                            pointRadius: 4,
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    color: '#6b8f7a',
                                    callback: function (v) { return new Intl.NumberFormat('vi-VN').format(v); }
                                },
                                grid: { color: 'rgba(255,255,255,0.04)' }
                            },
                            x: {
                                ticks: { color: '#6b8f7a' },
                                grid: { display: false }
                            }
                        }
                    }
                });
            }
        });
    </script>
</body>

</html>
